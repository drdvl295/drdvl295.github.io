<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air France</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding-top: 60px;
      background: #f5f5f5;
    }

    button {
      font-size: 28px;
      padding: 20px 40px;
      border-radius: 12px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }

    audio {

      width: 90%;
      max-width: 400px;
    }
  </style>
</head>

<body>

<h1>🎵 Air France</h1>

<button onclick="playAudio()">
▶️ Écouter
</button>

<br>
  
<audio id="audio" controls>

<script>
  function playAudio() {
    document.getElementById('audio').play();
  }
</script>

</body>
</html>
